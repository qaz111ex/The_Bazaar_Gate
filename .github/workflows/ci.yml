name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-py310-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-py310-pip-

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt

      - name: Build executable
        run: |
          python build_exe.py

      - name: Verify build output
        run: |
          if (Test-Path "dist/TheBazaarGate.exe") {
            Write-Host "Build successful: dist/TheBazaarGate.exe"
            Get-Item "dist/TheBazaarGate.exe" | Select-Object Name, Length
          } else {
            Write-Host "ERROR: Build output not found"
            exit 1
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TheBazaarGate-${{ runner.os }}
          path: dist/TheBazaarGate.exe
          retention-days: 30

  lint:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install ruff
        run: python -m pip install ruff

      - name: Run ruff linter
        run: python -m ruff check dist/launcher_tool.py build_exe.py tests

  test:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt

      - name: Validate CSV
        run: |
          python -c "import csv, pathlib; f = pathlib.Path('dist/language.csv').open('r', encoding='utf-8-sig'); reader = csv.DictReader(f); rows = list(reader); headers = reader.fieldnames; print(f'CSV has {len(rows)} translation keys'); print(f'Languages: {headers[1:]}'); print('CSV validation passed!'); f.close()"

      - name: Validate Python syntax
        run: |
          python -c "import py_compile; py_compile.compile('dist/launcher_tool.py', doraise=True); py_compile.compile('build_exe.py', doraise=True); print('Python syntax OK')"

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v